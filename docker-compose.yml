version: '3.9'
services:
  ai-engine:
    build: ./ai-engine
    ports: ["8000:8000"]
    env_file: ./ai-engine/.env
    volumes: ["./ai-engine:/app"]
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  backend:
    build: ./backend
    ports: ["5000:5000"]
    env_file: ./backend/.env
    depends_on: [ai-engine]
    volumes: ["./backend:/app"]
    working_dir: /app
    command: npm run dev
    environment:
      - AI_ENGINE_URL=http://ai-engine:8000

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: ./frontend/.env
    depends_on: [backend]
    volumes: ["./frontend:/app"]
    working_dir: /app
    command: npm start
