version: '3.9'
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  ai-engine:
    build: ./ai-engine
    ports: ["8000:8000"]
    env_file: ./ai-engine/.env
    volumes: ["./ai-engine:/app"]
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  backend:
    build: ./backend
    ports: ["5000:5000"]
    env_file: ./backend/.env
    depends_on: [mongo, ai-engine]
    volumes: ["./backend:/app"]
    working_dir: /app
    command: npm run dev

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes: ["./frontend:/app"]
    working_dir: /app
    command: npm start

volumes:
  mongo_data:
